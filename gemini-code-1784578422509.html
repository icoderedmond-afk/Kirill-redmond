<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Chrome Dino Game</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }
    body {
      background-color: #f7f7f7;
      font-family: 'Courier New', Courier, monospace;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      color: #535353;
    }
    h1 {
      margin-bottom: 10px;
      font-size: 24px;
    }
    p {
      margin-bottom: 20px;
      font-size: 14px;
    }
    #game-container {
      position: relative;
      border-bottom: 2px solid #535353;
      background-color: #fff;
      box-shadow: 0 4px 10px rgba(0,0,0,0.05);
    }
    canvas {
      display: block;
    }
  </style>
</head>
<body>

  <h1>Chrome Dino Runner</h1>
  <p>Press <strong>Space</strong> or <strong>Up Arrow</strong> to Jump / Restart</p>

  <div id="game-container">
    <canvas id="gameCanvas" width="600" height="150"></canvas>
  </div>

  <script>
    const canvas = document.getElementById('gameCanvas');
    const ctx = canvas.getContext('2d');

    // Game variables
    let score = 0;
    let highScore = 0;
    let gameSpeed = 5;
    let isGameOver = false;
    let isGameStarted = false;
    let frameCount = 0;

    // Dino properties
    const dino = {
      x: 50,
      y: 110,
      width: 20,
      height: 30,
      dy: 0,
      gravity: 0.6,
      jumpForce: -10,
      isGrounded: true
    };

    // Obstacles array
    let obstacles = [];

    // Keyboard Controls
    window.addEventListener('keydown', (e) => {
      if (e.code === 'Space' || e.code === 'ArrowUp') {
        e.preventDefault();
        if (!isGameStarted) {
          isGameStarted = true;
          animate();
        } else if (isGameOver) {
          resetGame();
        } else if (dino.isGrounded) {
          dino.dy = dino.jumpForce;
          dino.isGrounded = false;
        }
      }
    });
