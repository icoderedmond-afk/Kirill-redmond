<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Blox RPG - Kitsune Pirate Edition</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      user-select: none;
    }
    body {
      overflow: hidden;
      background-color: #05050d;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    #ui {
      position: absolute;
      top: 15px;
      left: 15px;
      background: rgba(15, 15, 25, 0.88);
      padding: 12px 24px;
      border-radius: 10px;
      border: 2px solid #3d3b63;
      color: #fff;
      font-size: 16px;
      font-weight: bold;
      display: flex;
      flex-direction: column;
      gap: 10px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.6);
      z-index: 10;
    }
    .stats-row {
      display: flex;
      gap: 25px;
    }
    #xp-container {
      width: 100%;
      height: 10px;
      background: #222;
      border-radius: 5px;
      overflow: hidden;
      border: 1px solid #444;
    }
    #xp-bar {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #00d2ff, #00ff88);
      transition: width 0.2s ease;
    }
    #skills-bar {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 10px;
      background: rgba(15, 15, 25, 0.88);
      padding: 12px 18px;
      border-radius: 12px;
      border: 2px solid #3d3b63;
      z-index: 10;
    }
    .skill-card {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      background: #232238;
      padding: 8px 12px;
      border-radius: 8px;
      border: 1px solid #524f80;
      color: #fff;
      font-size: 13px;
      min-width: 85px;
      overflow: hidden;
    }
    .skill-card .key {
      background: #00d2ff;
      color: #000;
      font-weight: bold;
      padding: 2px 8px;
      border-radius: 4px;
      margin-bottom: 4px;
      font-family: monospace;
    }
    .skill-card .name {
      color: #70e2ff;
      font-weight: bold;
    }
    .cd-overlay {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.7);
      color: #ff3366;
      font-weight: bold;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.1s;
    }
    .skill-card.on-cd .cd-overlay {
      opacity: 1;
    }
    #trans-status {
      display: none;
      color: #ff00ff;
      font-weight: bold;
      text-shadow: 0 0 8px #ff00ff;
    }
    #game-over {
      position: absolute;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      background: rgba(0, 0, 0, 0.88);
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #fff;
      z-index: 20;
    }
    .btn-key {
      background: #444;
      color: #fff;
      padding: 2px 6px;
      border-radius: 4px;
      font-family: monospace;
    }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

  <div id="ui">
    <div class="stats-row">
      <div>Level: <span id="lvl" style="color: #4caf50;">1</span></div>
      <div>Beli: $<span id="beli" style="color: #ffeb3b;">0</span></div>
      <div>Fruit: <span style="color: #00e5ff;">Kitsune</span></div>
      <div>HP: <span id="hp" style="color: #ff5252;">150/150</span></div>
      <div id="trans-status">FOX FORM ACTIVE</div>
    </div>
    <div id="xp-container">
      <div id="xp-bar"></div>
    </div>
  </div>

  <div id="skills-bar">
    <div class="skill-card">
      <span class="key">L-CLICK</span>
      <span class="name">Dual Slash</span>
    </div>
    <div class="skill-card" id="card-z">
      <span class="key">Z</span>
      <span class="name">Fox Fire</span>
      <div class="cd-overlay" id="cd-z">1s</div>
    </div>
    <div class="skill-card" id="card-x">
      <span class="key">X</span>
      <span class="name">Fox Dash</span>
      <div class="cd-overlay" id="cd-x">1s</div>
    </div>
    <div class="skill-card" id="card-c">
      <span class="key">C</span>
      <span class="name">Tail Burst</span>
      <div class="cd-overlay" id="cd-c">1s</div>
    </div>
    <div class="skill-card" style="border-color: #ff00ff;">
      <span class="key" style="background: #ff00ff; color: #fff;">V</span>
      <span class="name" style="color: #ff77ff;">Transform</span>
    </div>
  </div>

  <div id="game-over">
    <h1 style="font-size: 48px; color: #ff3333; margin-bottom: 10px;">YOU DIED</h1>
    <p style="font-size: 20px;">Press <span class="btn-key">R</span> to Respawn</p>
  </div>

  <script>
    // --- 3D SCENE SETUP ---
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a0a14);
    scene.fog = new THREE.FogExp2(0x0a0a14, 0.012);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.body.appendChild(renderer.domElement);

    // --- LIGHTING ---
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambientLight);

    const sunLight = new THREE.DirectionalLight(0xb0e5ff, 0.9);
    sunLight.position.set(30, 50, 30);
    sunLight.castShadow = true;
    scene.add(sunLight);

    // --- ARENA ---
    const floorGeo = new THREE.PlaneGeometry(120, 120);
    const floorMat = new THREE.MeshStandardMaterial({ color: 0x18251e, roughness: 0.7 });
    const floor = new THREE.Mesh(floorGeo, floorMat);
    floor.rotation.x = -Math.PI / 2;
    floor.receiveShadow = true;
    scene.add(floor);

    const grid = new THREE.GridHelper(120, 60, 0x00e5ff, 0x1f3d47);
    grid.position.y = 0.01;
    scene.add(grid);

    // --- PLAYER SETUP ---
    const playerGroup = new THREE.Group();
    
    // Human Form
    const humanGroup = new THREE.Group();
    const bodyGeo = new THREE.CylinderGeometry(0.8, 0.8, 2, 16);
    const bodyMat = new THREE.MeshStandardMaterial({ color: 0x111122, roughness: 0.3 });
    const body = new THREE.Mesh(bodyGeo, bodyMat);
    body.position.y = 1;
    humanGroup.add(body);

    const headGeo = new THREE.SphereGeometry(0.6, 16, 16);
    const headMat = new THREE.MeshStandardMaterial({ color: 0xffffff });
    const head = new THREE.Mesh(headGeo, headMat);
    head.position.y = 2.4;
    humanGroup.add(head);

    const earGeo = new THREE.ConeGeometry(0.25, 0.6, 4);
    const earMat = new THREE.MeshBasicMaterial({ color: 0x00e5ff });
    const earL = new THREE.Mesh(earGeo, earMat);
    earL.position.set(-0.3, 3.0, 0);
    const earR = new THREE.Mesh(earGeo, earMat);
    earR.position.set(0.3, 3.0, 0);
    humanGroup.add(earL);
    humanGroup.add(earR);

    function createSword(xOffset) {
      const swordGroup = new THREE.Group();
      const bladeGeo = new THREE.BoxGeometry(0.12, 0.12, 3.2);
      const bladeMat = new THREE.MeshStandardMaterial({ color: 0x00e5ff, emissive: 0x005577, metalness: 0.9 });
      const blade = new THREE.Mesh(bladeGeo, bladeMat);
      blade.position.z = 1.2;
      swordGroup.add(blade);
      swordGroup.position.set(xOffset, 1.2, 0.2);
      return swordGroup;
    }
    humanGroup.add(createSword(-0.9));
    humanGroup.add(createSword(0.9));
    playerGroup.add(humanGroup);

    // --- UPGRADED KITSUNE FOX FORM ---
    const foxGroup = new THREE.Group();

    // 1. Sleek Main Torso
    const foxBodyGeo = new THREE.CylinderGeometry(0.9, 1.1, 3.4, 16);
    const foxBodyMat = new THREE.MeshStandardMaterial({ color: 0x0f172a, emissive: 0x0284c7, roughness: 0.2, metalness: 0.5 });
    const foxBodyMesh = new THREE.Mesh(foxBodyGeo, foxBodyMat);
    foxBodyMesh.rotation.x = Math.PI / 2;
    foxBodyMesh.position.set(0, 1.5, 0);
    foxGroup.add(foxBodyMesh);

    // Chest Mane (Glowing White/Pink Fur)
    const chestGeo = new THREE.SphereGeometry(1.2, 16, 16);
    const chestMat = new THREE.MeshStandardMaterial({ color: 0xffe4e6, emissive: 0xff00ff, emissiveIntensity: 0.3 });
    const chestMesh = new THREE.Mesh(chestGeo, chestMat);
    chestMesh.position.set(0, 1.7, 1.1);
    foxGroup.add(chestMesh);

    // 2. Head & Snout
    const foxHeadGroup = new THREE.Group();
    foxHeadGroup.position.set(0, 2.3, 1.8);

    const foxHeadBase = new THREE.Mesh(
      new THREE.SphereGeometry(0.85, 16, 16),
      foxBodyMat
    );
    foxHeadGroup.add(foxHeadBase);

    const snoutGeo = new THREE.ConeGeometry(0.5, 1.2, 16);
    const snout = new THREE.Mesh(snoutGeo, foxBodyMat);
    snout.rotation.x = -Math.PI / 2;
    snout.position.set(0, -0.1, 0.8);
    foxHeadGroup.add(snout);

    // Glowing Eyes
    const eyeGeo = new THREE.SphereGeometry(0.18, 8, 8);
    const eyeMat = new THREE.MeshBasicMaterial({ color: 0x00ffff });
    const eyeL = new THREE.Mesh(eyeGeo, eyeMat); eyeL.position.set(-0.35, 0.2, 0.6);
    const eyeR = new THREE.Mesh(eyeGeo, eyeMat); eyeR.position.set(0.35, 0.2, 0.6);
    foxHeadGroup.add(eyeL); foxHeadGroup.add(eyeR);

    // Forehead Spirit Gem
    const gemGeo = new THREE.OctahedronGeometry(0.25);
    const gemMat = new THREE.MeshBasicMaterial({ color: 0xff00ff });
    const gem = new THREE.Mesh(gemGeo, gemMat);
    gem.position.set(0, 0.5, 0.65);
    foxHeadGroup.add(gem);

    // Stylized Fox Ears (Outer + Inner Glow)
    for (let isRight of [-1, 1]) {
      const earOuter = new THREE.Mesh(
        new THREE.ConeGeometry(0.35, 1.2, 4),
        foxBodyMat
      );
      earOuter.position.set(isRight * 0.45, 1.0, -0.1);
      earOuter.rotation.z = isRight * -0.2;

      const earInner = new THREE.Mesh(
        new THREE.ConeGeometry(0.2, 0.9, 4),
        new THREE.MeshBasicMaterial({ color: 0xff00ff })
      );
      earInner.position.set(isRight * 0.45, 1.0, 0.05);
      earInner.rotation.z = isRight * -0.2;

      foxHeadGroup.add(earOuter);
      foxHeadGroup.add(earInner);
    }

    foxGroup.add(foxHeadGroup);

    // 3. Four Sleek Legs with Glowing Paws
    const legPositions = [
      [-0.8, 0, 1.2], [0.8, 0, 1.2],
      [-0.8, 0, -1.2], [0.8, 0, -1.2]
    ];
    legPositions.forEach(([x, y, z]) => {
      const legGeo = new THREE.CylinderGeometry(0.25, 0.18, 1.4);
      const leg = new THREE.Mesh(legGeo, foxBodyMat);
      leg.position.set(x, 0.7, z);

      const pawGeo = new THREE.SphereGeometry(0.3, 12, 12);
      const pawMat = new THREE.MeshBasicMaterial({ color: 0x00e5ff });
      const paw = new THREE.Mesh(pawGeo, pawMat);
      paw.position.set(x, 0.15, z + 0.1);

      foxGroup.add(leg);
      foxGroup.add(paw);
    });

    // 4. Majestic Fanned 9-Tails with Magenta/Cyan Tips
    const tailsGroup = new THREE.Group();
    tailsGroup.position.set(0, 1.6, -1.5);

    for (let i = -4; i <= 4; i++) {
      const tailSegment = new THREE.Group();
      
      const tailBaseGeo = new THREE.ConeGeometry(0.35, 3.2, 12);
      const tailMat = new THREE.MeshStandardMaterial({ color: 0x1e1b4b, emissive: 0x4c1d95, roughness: 0.3 });
      const tailMesh = new THREE.Mesh(tailBaseGeo, tailMat);
      tailMesh.rotation.x = -Math.PI / 3;
      tailSegment.add(tailMesh);

      // Glowing Tip
      const tipGeo = new THREE.ConeGeometry(0.2, 1.2, 12);
      const tipMat = new THREE.MeshBasicMaterial({ color: i % 2 === 0 ? 0xff00ff : 0x00ffff });
      const tipMesh = new THREE.Mesh(tipGeo, tipMat);
      tipMesh.position.set(0, 1.6, -0.9);
      tipMesh.rotation.x = -Math.PI / 3;
      tailSegment.add(tipMesh);

      tailSegment.rotation.y = (i * Math.PI) / 14;
      tailSegment.rotation.z = (i * Math.PI) / 28;

      tailsGroup.add(tailSegment);
    }
    foxGroup.add(tailsGroup);

    // 5. Orbiting Fox-Fire Spirit Orbs
    const orbitingOrbs = [];
    for (let i = 0; i < 3; i++) {
      const orbGeo = new THREE.SphereGeometry(0.4, 16, 16);
      const orbMat = new THREE.MeshBasicMaterial({ color: 0x00ffff });
      const orb = new THREE.Mesh(orbGeo, orbMat);
      scene.add(orb);
      orbitingOrbs.push(orb);
    }

    // Persistent Magic Aura Rings
    const transformAuraGeo = new THREE.TorusGeometry(3.2, 0.12, 16, 32);
    const transformAuraMat = new THREE.MeshBasicMaterial({ color: 0xff00ff, transparent: true, opacity: 0.7 });
    const transformAuraRing = new THREE.Mesh(transformAuraGeo, transformAuraMat);
    transformAuraRing.rotation.x = Math.PI / 2;
    transformAuraRing.position.y = 0.1;
    foxGroup.add(transformAuraRing);

    foxGroup.visible = false;
    playerGroup.add(foxGroup);

    scene.add(playerGroup);

    // --- GAME STATE ---
    let level = 1;
    let currentXp = 0;
    let xpNeeded = 100;
    let beli = 0;
    let hp = 150;
    let maxHp = 150;
    let isGameOver = false;
    let isTransformed = false;

    const cooldowns = { Z: false, X: false, C: false };

    const enemies = [];
    const projectiles = [];
    const visualEffects = [];
    const keys = {};

    // --- CONTROLS ---
    window.addEventListener('keydown', (e) => {
      keys[e.code] = true;
      if (!isGameOver) {
        if (e.code === 'KeyZ') castFoxFire();
        if (e.code === 'KeyX') castFoxDash();
        if (e.code === 'KeyC') castTailBurst();
        if (e.code === 'KeyV') toggleTransformation();
      }
      if (e.code === 'KeyR' && isGameOver) restartGame();
    });
    window.addEventListener('keyup', (e) => keys[e.code] = false);

    const raycaster = new THREE.Raycaster();
    const mousePlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
    const targetPoint = new THREE.Vector3();

    window.addEventListener('mousemove', (e) => {
      const mouse = new THREE.Vector2(
        (e.clientX / window.innerWidth) * 2 - 1,
        -(e.clientY / window.innerHeight) * 2 + 1
      );
      raycaster.setFromCamera(mouse, camera);
      raycaster.ray.intersectPlane(mousePlane, targetPoint);
    });

    window.addEventListener('mousedown', (e) => {
      if (e.button === 0 && !isGameOver) swordSlash();
    });

    function triggerCooldown(skillKey, cardId) {
      cooldowns[skillKey] = true;
      const card = document.getElementById(cardId);
      card.classList.add('on-cd');

      setTimeout(() => {
        cooldowns[skillKey] = false;
        card.classList.remove('on-cd');
      }, 1000);
    }

    // --- LEVEL & DAMAGE SCALING ---
    function gainXp(amount) {
      currentXp += amount;
      if (currentXp >= xpNeeded) {
        currentXp -= xpNeeded;
        level += 1;
        xpNeeded = Math.floor(xpNeeded * 1.2);
        maxHp += 15;
        hp = maxHp;
      }
      updateUI();
    }

    function getDmgMultiplier() {
      const levelBoost = 1 + (level - 1) * 0.08;
      const transBoost = isTransformed ? 1.25 : 1.0;
      return levelBoost * transBoost;
    }

    // --- TRANSFORMATION ---
    function toggleTransformation() {
      isTransformed = !isTransformed;
      humanGroup.visible = !isTransformed;
      foxGroup.visible = isTransformed;

      orbitingOrbs.forEach(orb => orb.visible = isTransformed);

      const statusEl = document.getElementById('trans-status');
      statusEl.style.display = isTransformed ? 'block' : 'none';

      // Energy Pillar upward
      const pillarGeo = new THREE.CylinderGeometry(1.5, 3.5, 30, 16);
      const pillarMat = new THREE.MeshBasicMaterial({ color: isTransformed ? 0xff00ff : 0x00e5ff, transparent: true, opacity: 0.85 });
      const pillar = new THREE.Mesh(pillarGeo, pillarMat);
      pillar.position.copy(playerGroup.position);
      pillar.position.y = 15;
      scene.add(pillar);

      // Radial Waves
      const ringGeo1 = new THREE.RingGeometry(1, 10, 32);
      const ringMat1 = new THREE.MeshBasicMaterial({ color: 0xff00ff, side: THREE.DoubleSide, transparent: true, opacity: 0.9 });
      const ring1 = new THREE.Mesh(ringGeo1, ringMat1);
      ring1.rotation.x = Math.PI / 2;
      ring1.position.copy(playerGroup.position);
      ring1.position.y = 0.2;
      scene.add(ring1);

      const ringGeo2 = new THREE.RingGeometry(0.5, 6, 32);
      const ringMat2 = new THREE.MeshBasicMaterial({ color: 0x00ffff, side: THREE.DoubleSide, transparent: true, opacity: 0.9 });
      const ring2 = new THREE.Mesh(ringGeo2, ringMat2);
      ring2.rotation.x = Math.PI / 2;
      ring2.position.copy(playerGroup.position);
      ring2.position.y = 0.3;
      scene.add(ring2);

      visualEffects.push({
        pillar: pillar,
        ring1: ring1,
        ring2: ring2,
        scale: 1,
        opacity: 0.9,
        type: 'transform'
      });
    }

    // --- SKILLS ---
    function swordSlash() {
      const dmg = 45 * getDmgMultiplier();
      const attackRange = 6.0;

      const slashGeo = new THREE.RingGeometry(1.5, 5.0, 16, 1, 0, Math.PI * 1.2);
      const slashMat = new THREE.MeshBasicMaterial({ color: isTransformed ? 0xff00ff : 0x00ffff, side: THREE.DoubleSide, transparent: true, opacity: 0.85 });
      const slash = new THREE.Mesh(slashGeo, slashMat);
      slash.rotation.x = Math.PI / 2;
      slash.rotation.z = playerGroup.rotation.y + Math.PI / 2;
      slash.position.copy(playerGroup.position);
      slash.position.y = 1.2;
      scene.add(slash);

      setTimeout(() => scene.remove(slash), 120);

      enemies.forEach((enemy) => {
        if (playerGroup.position.distanceTo(enemy.mesh.position) < attackRange) {
          enemy.hp -= dmg;
          updateEnemyHealthBar(enemy);
          const knockDir = enemy.mesh.position.clone().sub(playerGroup.position).normalize();
          enemy.mesh.position.addScaledVector(knockDir, 2.2);
        }
      });
    }

    function castFoxFire() {
      if (cooldowns.Z) return;
      triggerCooldown('Z', 'card-z');

      const dmg = 35 * getDmgMultiplier();
      const dir = targetPoint.clone().sub(playerGroup.position);
      dir.y = 0; dir.normalize();

      for (let i = -1; i <= 1; i++) {
        const fbGeo = new THREE.SphereGeometry(0.7, 16, 16);
        const fbMat = new THREE.MeshBasicMaterial({ color: isTransformed ? 0xff00ff : 0x00f0ff });
        const fb = new THREE.Mesh(fbGeo, fbMat);

        const spreadDir = dir.clone().applyAxisAngle(new THREE.Vector3(0, 1, 0), i * 0.25);
        fb.position.copy(playerGroup.position);
        fb.position.y = 1.2;

        scene.add(fb);
        projectiles.push({ mesh: fb, direction: spreadDir, life: 50, damage: dmg });
      }
    }

    function castFoxDash() {
      if (cooldowns.X) return;
      triggerCooldown('X', 'card-x');

      const dmg = 60 * getDmgMultiplier();
      const dir = targetPoint.clone().sub(playerGroup.position);
      dir.y = 0; dir.normalize();

      playerGroup.position.addScaledVector(dir, isTransformed ? 16 : 12);

      enemies.forEach((enemy) => {
        if (playerGroup.position.distanceTo(enemy.mesh.position) < 6.5) {
          enemy.hp -= dmg;
          updateEnemyHealthBar(enemy);
        }
      });
    }

    function castTailBurst() {
      if (cooldowns.C) return;
      triggerCooldown('C', 'card-c');

      const dmg = 55 * getDmgMultiplier();
      const radius = 7.5;

      const beamGeo = new THREE.CylinderGeometry(0.5, radius * 0.8, 20, 16);
      const beamMat = new THREE.MeshBasicMaterial({ color: isTransformed ? 0xff00ff : 0x8000ff, transparent: true, opacity: 0.9 });
      const beam = new THREE.Mesh(beamGeo, beamMat);
      beam.position.copy(playerGroup.position);
      beam.position.y = 10;
      scene.add(beam);

      const domeGeo = new THREE.SphereGeometry(1, 24, 16, 0, Math.PI * 2, 0, Math.PI / 2);
      const domeMat = new THREE.MeshBasicMaterial({
        color: 0x00e5ff,
        transparent: true,
        opacity: 0.85,
        wireframe: true
      });
      const dome = new THREE.Mesh(domeGeo, domeMat);
      dome.position.copy(playerGroup.position);
      scene.add(dome);

      const orbs = [];
      for (let i = 0; i < 8; i++) {
        const angle = (i * Math.PI * 2) / 8;
        const orbGeo = new THREE.SphereGeometry(0.6, 12, 12);
        const orbMat = new THREE.MeshBasicMaterial({ color: 0xff00ff });
        const orb = new THREE.Mesh(orbGeo, orbMat);
        orb.position.copy(playerGroup.position);
        orb.position.y = 1.0;
        scene.add(orb);

        orbs.push({
          mesh: orb,
          dir: new THREE.Vector3(Math.cos(angle), 0, Math.sin(angle))
        });
      }

      const burstLight = new THREE.PointLight(0xff00ff, 10, 22);
      burstLight.position.copy(playerGroup.position);
      scene.add(burstLight);

      visualEffects.push({
        beam: beam,
        dome: dome,
        orbs: orbs,
        light: burstLight,
        scale: 1,
        opacity: 0.9,
        type: 'tailBurst'
      });

      enemies.forEach((enemy) => {
        if (playerGroup.position.distanceTo(enemy.mesh.position) < radius) {
          enemy.hp -= dmg;
          updateEnemyHealthBar(enemy);
          const knockDir = enemy.mesh.position.clone().sub(playerGroup.position).normalize();
          enemy.mesh.position.addScaledVector(knockDir, 2.5);
        }
      });
    }

    // --- CREATING PIRATE NPC MESH & HEALTH BAR ---
    function createPirateMesh() {
      const pirateGroup = new THREE.Group();

      const bodyGeo = new THREE.CylinderGeometry(0.7, 0.8, 2, 16);
      const bodyMat = new THREE.MeshStandardMaterial({ color: 0x3b1e08, roughness: 0.6 });
      const body = new THREE.Mesh(bodyGeo, bodyMat);
      body.position.y = 1;
      pirateGroup.add(body);

      const emblemGeo = new THREE.BoxGeometry(0.4, 0.4, 0.1);
      const emblemMat = new THREE.MeshStandardMaterial({ color: 0xeeeeee });
      const emblem = new THREE.Mesh(emblemGeo, emblemMat);
      emblem.position.set(0, 1.2, 0.75);
      pirateGroup.add(emblem);

      const headGeo = new THREE.SphereGeometry(0.55, 16, 16);
      const headMat = new THREE.MeshStandardMaterial({ color: 0xd2a679 });
      const head = new THREE.Mesh(headGeo, headMat);
      head.position.y = 2.3;
      pirateGroup.add(head);

      const hatBaseGeo = new THREE.CylinderGeometry(1.2, 0.8, 0.3, 3);
      const hatMat = new THREE.MeshStandardMaterial({ color: 0x111111 });
      const hat = new THREE.Mesh(hatBaseGeo, hatMat);
      hat.position.y = 2.85;
      hat.rotation.y = Math.PI / 6;
      pirateGroup.add(hat);

      const armGroup = new THREE.Group();
      armGroup.position.set(0.9, 1.4, 0);

      const cutlassBladeGeo = new THREE.BoxGeometry(0.1, 0.25, 2.2);
      const cutlassMat = new THREE.MeshStandardMaterial({ color: 0xcccccc, metalness: 0.9, roughness: 0.2 });
      const cutlass = new THREE.Mesh(cutlassBladeGeo, cutlassMat);
      cutlass.position.set(0, 0, 0.8);
      armGroup.add(cutlass);

      const guardGeo = new THREE.TorusGeometry(0.25, 0.05, 8, 16, Math.PI);
      const guardMat = new THREE.MeshStandardMaterial({ color: 0xffb700, metalness: 0.8 });
      const guard = new THREE.Mesh(guardGeo, guardMat);
      guard.rotation.x = Math.PI / 2;
      guard.position.set(0, 0, -0.2);
      armGroup.add(guard);

      pirateGroup.add(armGroup);

      const hpBgGeo = new THREE.PlaneGeometry(2.2, 0.3);
      const hpBgMat = new THREE.MeshBasicMaterial({ color: 0x222222, side: THREE.DoubleSide });
      const hpBg = new THREE.Mesh(hpBgGeo, hpBgMat);
      hpBg.position.y = 3.5;

      const hpFillGeo = new THREE.PlaneGeometry(2.1, 0.2);
      const hpFillMat = new THREE.MeshBasicMaterial({ color: 0x00ff44, side: THREE.DoubleSide });
      const hpFill = new THREE.Mesh(hpFillGeo, hpFillMat);
      hpFill.position.set(0, 0, 0.01);
      hpBg.add(hpFill);

      pirateGroup.add(hpBg);

      return {
        mesh: pirateGroup,
        arm: armGroup,
        hpFill: hpFill
      };
    }

    function updateEnemyHealthBar(enemy) {
      const hpPercent = Math.max(0, enemy.hp / enemy.maxHp);
      enemy.hpFill.scale.x = hpPercent;
      enemy.hpFill.position.x = (hpPercent - 1) * 1.05;
      if (hpPercent < 0.3) {
        enemy.hpFill.material.color.setHex(0xff2222);
      } else if (hpPercent < 0.6) {
        enemy.hpFill.material.color.setHex(0xffaa00);
      }
    }

    function spawnEnemy() {
      if (enemies.length < 6 && !isGameOver) {
        const angle = Math.random() * Math.PI * 2;
        const dist = 28 + Math.random() * 10;
        const x = Math.cos(angle) * dist;
        const z = Math.sin(angle) * dist;

        const pirate = createPirateMesh();
        pirate.mesh.position.set(x, 0, z);
        scene.add(pirate.mesh);

        const baseHp = 50 + (level * 25);
        const enemyDmg = 0.3 + (level * 0.05);

        enemies.push({
          mesh: pirate.mesh,
          arm: pirate.arm,
          hpFill: pirate.hpFill,
          hp: baseHp,
          maxHp: baseHp,
          damage: enemyDmg,
          speed: 0.09 + Math.random() * 0.02,
          slashTimer: 0
        });
      }
    }
    setInterval(spawnEnemy, 1400);

    function restartGame() {
      level = 1; currentXp = 0; xpNeeded = 100;
      beli = 0; maxHp = 150; hp = 150;
      isTransformed = false;
      humanGroup.visible = true;
      foxGroup.visible = false;
      orbitingOrbs.forEach(orb => orb.visible = false);
      document.getElementById('trans-status').style.display = 'none';

      playerGroup.position.set(0, 0, 0);
      enemies.forEach(e => scene.remove(e.mesh));
      enemies.length = 0;
      projectiles.forEach(p => scene.remove(p.mesh));
      projectiles.length = 0;

      isGameOver = false;
      document.getElementById('game-over').style.display = 'none';
      updateUI();
    }

    function updateUI() {
      document.getElementById('lvl').innerText = level;
      document.getElementById('beli').innerText = beli;
      document.getElementById('hp').innerText = `${Math.ceil(hp)}/${maxHp}`;
      document.getElementById('xp-bar').style.width = `${(currentXp / xpNeeded) * 100}%`;
    }

    // --- GAME LOOP ---
    let orbTime = 0;
    function animate() {
      requestAnimationFrame(animate);

      if (!isGameOver) {
        const moveSpeed = isTransformed ? 0.27 : 0.18;
        if (keys['KeyW'] || keys['ArrowUp']) playerGroup.position.z -= moveSpeed;
        if (keys['KeyS'] || keys['ArrowDown']) playerGroup.position.z += moveSpeed;
        if (keys['KeyA'] || keys['ArrowLeft']) playerGroup.position.x -= moveSpeed;
        if (keys['KeyD'] || keys['ArrowRight']) playerGroup.position.x += moveSpeed;

        playerGroup.position.x = Math.max(-55, Math.min(55, playerGroup.position.x));
        playerGroup.position.z = Math.max(-55, Math.min(55, playerGroup.position.z));

        const lookAngle = Math.atan2(
          targetPoint.x - playerGroup.position.x,
          targetPoint.z - playerGroup.position.z
        );
        playerGroup.rotation.y = lookAngle;

        // Animate Transformed Fox Form Features
        if (isTransformed) {
          transformAuraRing.rotation.z += 0.05;
          tailsGroup.children.forEach((tail, idx) => {
            tail.rotation.x = Math.sin(Date.now() * 0.005 + idx) * 0.1;
          });

          orbTime += 0.04;
          orbitingOrbs.forEach((orb, idx) => {
            const angle = orbTime + (idx * Math.PI * 2) / 3;
            orb.position.x = playerGroup.position.x + Math.cos(angle) * 3.5;
            orb.position.z = playerGroup.position.z + Math.sin(angle) * 3.5;
            orb.position.y = playerGroup.position.y + 2.0 + Math.sin(orbTime * 2 + idx) * 0.5;
          });
        } else {
          orbitingOrbs.forEach(orb => orb.visible = false);
        }

        camera.position.x = playerGroup.position.x;
        camera.position.y = playerGroup.position.y + 20;
        camera.position.z = playerGroup.position.z + 18;
        camera.lookAt(playerGroup.position);

        // Animate Visual Effects
        for (let i = visualEffects.length - 1; i >= 0; i--) {
          const fx = visualEffects[i];
          fx.opacity -= 0.05;

          if (fx.type === 'tailBurst') {
            fx.scale += 0.55;
            fx.dome.scale.set(fx.scale, fx.scale, fx.scale);
            fx.dome.material.opacity = fx.opacity;
            fx.beam.material.opacity = fx.opacity;

            fx.orbs.forEach(orb => {
              orb.mesh.position.addScaledVector(orb.dir, 0.45);
              orb.mesh.material.opacity = fx.opacity;
            });

            if (fx.opacity <= 0) {
              scene.remove(fx.beam);
              scene.remove(fx.dome);
              scene.remove(fx.light);
              fx.orbs.forEach(orb => scene.remove(orb.mesh));
              visualEffects.splice(i, 1);
            }
          } else if (fx.type === 'transform') {
            fx.ring1.scale.addScalar(0.4);
            fx.ring2.scale.addScalar(0.6);
            fx.ring1.material.opacity = fx.opacity;
            fx.ring2.material.opacity = fx.opacity;
            fx.pillar.material.opacity = fx.opacity;

            if (fx.opacity <= 0) {
              scene.remove(fx.pillar);
              scene.remove(fx.ring1);
              scene.remove(fx.ring2);
              visualEffects.splice(i, 1);
            }
          }
        }

        // Projectiles
        for (let i = projectiles.length - 1; i >= 0; i--) {
          const p = projectiles[i];
          p.mesh.position.addScaledVector(p.direction, 0.5);
          p.life--;

          enemies.forEach((enemy) => {
            if (p.mesh.position.distanceTo(enemy.mesh.position) < 1.8) {
              enemy.hp -= p.damage;
              updateEnemyHealthBar(enemy);
              p.life = 0;
            }
          });

          if (p.life <= 0) {
            scene.remove(p.mesh);
            projectiles.splice(i, 1);
          }
        }

        // Pirate NPCs logic
        for (let i = enemies.length - 1; i >= 0; i--) {
          const enemy = enemies[i];
          const distToPlayer = enemy.mesh.position.distanceTo(playerGroup.position);
          const dir = playerGroup.position.clone().sub(enemy.mesh.position);
          dir.y = 0; dir.normalize();

          enemy.mesh.position.addScaledVector(dir, enemy.speed);
          enemy.mesh.rotation.y = Math.atan2(dir.x, dir.z);

          const hpBarBg = enemy.mesh.children[enemy.mesh.children.length - 1];
          hpBarBg.lookAt(camera.position);

          if (distToPlayer < 2.5) {
            enemy.slashTimer += 0.15;
            enemy.arm.rotation.x = -Math.sin(enemy.slashTimer) * 1.5;

            if (Math.sin(enemy.slashTimer) > 0.8) {
              const slashArcGeo = new THREE.RingGeometry(0.8, 2.2, 8, 1, 0, Math.PI * 0.8);
              const slashArcMat = new THREE.MeshBasicMaterial({ color: 0xff3333, side: THREE.DoubleSide, transparent: true, opacity: 0.8 });
              const slashArc = new THREE.Mesh(slashArcGeo, slashArcMat);
              slashArc.rotation.x = Math.PI / 2;
              slashArc.position.copy(enemy.mesh.position);
              slashArc.position.y = 1.2;
              scene.add(slashArc);
              setTimeout(() => scene.remove(slashArc), 80);

              hp -= enemy.damage;
              if (hp <= 0) {
                hp = 0;
                isGameOver = true;
                document.getElementById('game-over').style.display = 'flex';
              }
              updateUI();
            }
          } else {
            enemy.arm.rotation.x = 0;
          }

          if (enemy.hp <= 0) {
            scene.remove(enemy.mesh);
            enemies.splice(i, 1);
            beli += 75;
            gainXp(45 + level * 5);
          }
        }
      }

      renderer.render(scene, camera);
    }

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    animate();
  </script>
</body>
</html>
