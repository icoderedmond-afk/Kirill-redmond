<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>3D Blox RPG - Kitsune XP Edition</title>
  <style>
    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
      user-select: none;
    }
    body {
      overflow: hidden;
      background-color: #05050d;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    #ui {
      position: absolute;
      top: 15px;
      left: 15px;
      background: rgba(15, 15, 25, 0.88);
      padding: 12px 24px;
      border-radius: 10px;
      border: 2px solid #3d3b63;
      color: #fff;
      font-size: 16px;
      font-weight: bold;
      display: flex;
      flex-direction: column;
      gap: 10px;
      box-shadow: 0 4px 20px rgba(0, 0, 0, 0.6);
      z-index: 10;
    }
    .stats-row {
      display: flex;
      gap: 25px;
    }
    #xp-container {
      width: 100%;
      height: 10px;
      background: #222;
      border-radius: 5px;
      overflow: hidden;
      border: 1px solid #444;
    }
    #xp-bar {
      width: 0%;
      height: 100%;
      background: linear-gradient(90deg, #00d2ff, #00ff88);
      transition: width 0.2s ease;
    }
    #skills-bar {
      position: absolute;
      bottom: 20px;
      left: 50%;
      transform: translateX(-50%);
      display: flex;
      gap: 10px;
      background: rgba(15, 15, 25, 0.88);
      padding: 12px 18px;
      border-radius: 12px;
      border: 2px solid #3d3b63;
      z-index: 10;
    }
    .skill-card {
      position: relative;
      display: flex;
      flex-direction: column;
      align-items: center;
      background: #232238;
      padding: 8px 12px;
      border-radius: 8px;
      border: 1px solid #524f80;
      color: #fff;
      font-size: 13px;
      min-width: 85px;
      overflow: hidden;
    }
    .skill-card .key {
      background: #00d2ff;
      color: #000;
      font-weight: bold;
      padding: 2px 8px;
      border-radius: 4px;
      margin-bottom: 4px;
      font-family: monospace;
    }
    .skill-card .name {
      color: #70e2ff;
      font-weight: bold;
    }
    .cd-overlay {
      position: absolute;
      top: 0; left: 0; width: 100%; height: 100%;
      background: rgba(0, 0, 0, 0.7);
      color: #ff3366;
      font-weight: bold;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 16px;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.1s;
    }
    .skill-card.on-cd .cd-overlay {
      opacity: 1;
    }
    #trans-status {
      display: none;
      color: #ff00ff;
      font-weight: bold;
      text-shadow: 0 0 8px #ff00ff;
    }
    #game-over {
      position: absolute;
      top: 0; left: 0;
      width: 100vw; height: 100vh;
      background: rgba(0, 0, 0, 0.88);
      display: none;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      color: #fff;
      z-index: 20;
    }
    .btn-key {
      background: #444;
      color: #fff;
      padding: 2px 6px;
      border-radius: 4px;
      font-family: monospace;
    }
  </style>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
</head>
<body>

  <div id="ui">
    <div class="stats-row">
      <div>Level: <span id="lvl" style="color: #4caf50;">1</span></div>
      <div>Beli: $<span id="beli" style="color: #ffeb3b;">0</span></div>
      <div>Fruit: <span style="color: #00e5ff;">Kitsune</span></div>
      <div>HP: <span id="hp" style="color: #ff5252;">150/150</span></div>
      <div id="trans-status">FOX FORM ACTIVE</div>
    </div>
    <div id="xp-container">
      <div id="xp-bar"></div>
    </div>
  </div>

  <div id="skills-bar">
    <div class="skill-card">
      <span class="key">L-CLICK</span>
      <span class="name">Dual Slash</span>
    </div>
    <div class="skill-card" id="card-z">
      <span class="key">Z</span>
      <span class="name">Fox Fire</span>
      <div class="cd-overlay" id="cd-z">1s</div>
    </div>
    <div class="skill-card" id="card-x">
      <span class="key">X</span>
      <span class="name">Fox Dash</span>
      <div class="cd-overlay" id="cd-x">1s</div>
    </div>
    <div class="skill-card" id="card-c">
      <span class="key">C</span>
      <span class="name">Tail Burst</span>
      <div class="cd-overlay" id="cd-c">1s</div>
    </div>
    <div class="skill-card" style="border-color: #ff00ff;">
      <span class="key" style="background: #ff00ff; color: #fff;">V</span>
      <span class="name" style="color: #ff77ff;">Transform</span>
    </div>
  </div>

  <div id="game-over">
    <h1 style="font-size: 48px; color: #ff3333; margin-bottom: 10px;">YOU DIED</h1>
    <p style="font-size: 20px;">Press <span class="btn-key">R</span> to Respawn</p>
  </div>

  <script>
    // --- 3D SCENE SETUP ---
    const scene = new THREE.Scene();
    scene.background = new THREE.Color(0x0a0a14);
    scene.fog = new THREE.FogExp2(0x0a0a14, 0.012);

    const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 1000);
    const renderer = new THREE.WebGLRenderer({ antialias: true });
    renderer.setSize(window.innerWidth, window.innerHeight);
    renderer.shadowMap.enabled = true;
    renderer.shadowMap.type = THREE.PCFSoftShadowMap;
    document.body.appendChild(renderer.domElement);

    // --- LIGHTING ---
    const ambientLight = new THREE.AmbientLight(0xffffff, 0.4);
    scene.add(ambientLight);

    const sunLight = new THREE.DirectionalLight(0xb0e5ff, 0.9);
    sunLight.position.set(30, 50, 30);
    sunLight.castShadow = true;
    scene.add(sunLight);

    // --- ARENA ---
    const floorGeo = new THREE.PlaneGeometry(120, 120);
    const floorMat = new THREE.MeshStandardMaterial({ color: 0x18251e, roughness: 0.7 });
    const floor = new THREE.Mesh(floorGeo, floorMat);
    floor.rotation.x = -Math.PI / 2;
    floor.receiveShadow = true;
    scene.add(floor);

    const grid = new THREE.GridHelper(120, 60, 0x00e5ff, 0x1f3d47);
    grid.position.y = 0.01;
    scene.add(grid);

    // --- PLAYER SETUP ---
    const playerGroup = new THREE.Group();
    
    // Human Form
    const humanGroup = new THREE.Group();
    const bodyGeo = new THREE.CylinderGeometry(0.8, 0.8, 2, 16);
    const bodyMat = new THREE.MeshStandardMaterial({ color: 0x111122, roughness: 0.3 });
    const body = new THREE.Mesh(bodyGeo, bodyMat);
    body.position.y = 1;
    humanGroup.add(body);

    const headGeo = new THREE.SphereGeometry(0.6, 16, 16);
    const headMat = new THREE.MeshStandardMaterial({ color: 0xffffff });
    const head = new THREE.Mesh(headGeo, headMat);
    head.position.y = 2.4;
    humanGroup.add(head);

    const earGeo = new THREE.ConeGeometry(0.25, 0.6, 4);
    const earMat = new THREE.MeshBasicMaterial({ color: 0x00e5ff });
    const earL = new THREE.Mesh(earGeo, earMat);
    earL.position.set(-0.3, 3.0, 0);
    const earR = new THREE.Mesh(earGeo, earMat);
    earR.position.set(0.3, 3.0, 0);
    humanGroup.add(earL);
    humanGroup.add(earR);

    function createSword(xOffset) {
      const swordGroup = new THREE.Group();
      const bladeGeo = new THREE.BoxGeometry(0.12, 0.12, 3.2);
      const bladeMat = new THREE.MeshStandardMaterial({ color: 0x00e5ff, emissive: 0x005577, metalness: 0.9 });
      const blade = new THREE.Mesh(bladeGeo, bladeMat);
      blade.position.z = 1.2;
      swordGroup.add(blade);
      swordGroup.position.set(xOffset, 1.2, 0.2);
      return swordGroup;
    }
    humanGroup.add(createSword(-0.9));
    humanGroup.add(createSword(0.9));
    playerGroup.add(humanGroup);

    // Transformed Kitsune Fox Form
    const foxGroup = new THREE.Group();
    const foxBodyGeo = new THREE.BoxGeometry(1.8, 1.4, 3.2);
    const foxMat = new THREE.MeshStandardMaterial({ color: 0x00e5ff, emissive: 0x004488, roughness: 0.2 });
    const foxBody = new THREE.Mesh(foxBodyGeo, foxMat);
    foxBody.position.y = 1.2;
    foxGroup.add(foxBody);

    const foxHeadGeo = new THREE.ConeGeometry(0.9, 1.6, 4);
    const foxHead = new THREE.Mesh(foxHeadGeo, foxMat);
    foxHead.rotation.x = -Math.PI / 3;
    foxHead.position.set(0, 1.8, 1.8);
    foxGroup.add(foxHead);

    for (let i = -4; i <= 4; i++) {
      const tailGeo = new THREE.CylinderGeometry(0.1, 0.35, 2.5, 8);
      const tailMat = new THREE.MeshBasicMaterial({ color: 0xff00ff });
      const tail = new THREE.Mesh(tailGeo, tailMat);
      tail.position.set(i * 0.25, 1.5, -1.8);
      tail.rotation.x = -Math.PI / 4;
      tail.rotation.z = (i * Math.PI) / 16;
      foxGroup.add(tail);
    }

    foxGroup.visible = false;
    playerGroup.add(foxGroup);

    scene.add(playerGroup);

    // --- GAME STATE ---
    let level = 1;
    let currentXp = 0;
    let xpNeeded = 100;
    let beli = 0;
    let hp = 150;
    let maxHp = 150;
    let isGameOver = false;
    let isTransformed = false;

    // Cooldown Flags
    const cooldowns = { Z: false, X: false, C: false };

    const enemies = [];
    const projectiles = [];
    const visualEffects = [];
    const keys = {};

    // --- CONTROLS ---
    window.addEventListener('keydown', (e) => {
      keys[e.code] = true;
      if (!isGameOver) {
        if (e.code === 'KeyZ') castFoxFire();
        if (e.code === 'KeyX') castFoxDash();
        if (e.code === 'KeyC') castTailBurst();
        if (e.code === 'KeyV') toggleTransformation();
      }
      if (e.code === 'KeyR' && isGameOver) restartGame();
    });
    window.addEventListener('keyup', (e) => keys[e.code] = false);

    const raycaster = new THREE.Raycaster();
    const mousePlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
    const targetPoint = new THREE.Vector3();

    window.addEventListener('mousemove', (e) => {
      const mouse = new THREE.Vector2(
        (e.clientX / window.innerWidth) * 2 - 1,
        -(e.clientY / window.innerHeight) * 2 + 1
      );
      raycaster.setFromCamera(mouse, camera);
      raycaster.ray.intersectPlane(mousePlane, targetPoint);
    });

    window.addEventListener('mousedown', (e) => {
      if (e.button === 0 && !isGameOver) swordSlash();
    });

    // Helper function for 1-second Cooldowns
    function triggerCooldown(skillKey, cardId) {
      cooldowns[skillKey] = true;
      const card = document.getElementById(cardId);
      card.classList.add('on-cd');

      setTimeout(() => {
        cooldowns[skillKey] = false;
        card.classList.remove('on-cd');
      }, 1000); // 1-second delay
    }

    // --- LEVEL & DAMAGE SCALING ---
    function gainXp(amount) {
      currentXp += amount;
      if (currentXp >= xpNeeded) {
        currentXp -= xpNeeded;
        level += 1;
        xpNeeded = Math.floor(xpNeeded * 1.2);
        maxHp += 15;
        hp = maxHp;
      }
      updateUI();
    }

    function getDmgMultiplier() {
      const levelBoost = 1 + (level - 1) * 0.08;
      const transBoost = isTransformed ? 1.25 : 1.0;
      return levelBoost * transBoost;
    }

    // --- TRANSFORMATION ---
    function toggleTransformation() {
      isTransformed = !isTransformed;
      humanGroup.visible = !isTransformed;
      foxGroup.visible = isTransformed;

      const statusEl = document.getElementById('trans-status');
      statusEl.style.display = isTransformed ? 'block' : 'none';

      const auraGeo = new THREE.RingGeometry(1, 6, 16);
      const auraMat = new THREE.MeshBasicMaterial({ color: isTransformed ? 0xff00ff : 0x00e5ff, side: THREE.DoubleSide, transparent: true, opacity: 0.9 });
      const aura = new THREE.Mesh(auraGeo, auraMat);
      aura.rotation.x = Math.PI / 2;
      aura.position.copy(playerGroup.position);
      scene.add(aura);
      setTimeout(() => scene.remove(aura), 200);
    }

    // --- SKILLS ---
    function swordSlash() {
      const dmg = 45 * getDmgMultiplier();
      const attackRange = 6.0;

      const slashGeo = new THREE.RingGeometry(1.5, 5.0, 16, 1, 0, Math.PI * 1.2);
      const slashMat = new THREE.MeshBasicMaterial({ color: isTransformed ? 0xff00ff : 0x00ffff, side: THREE.DoubleSide, transparent: true, opacity: 0.85 });
      const slash = new THREE.Mesh(slashGeo, slashMat);
      slash.rotation.x = Math.PI / 2;
      slash.rotation.z = playerGroup.rotation.y + Math.PI / 2;
      slash.position.copy(playerGroup.position);
      slash.position.y = 1.2;
      scene.add(slash);

      setTimeout(() => scene.remove(slash), 120);

      enemies.forEach((enemy) => {
        if (playerGroup.position.distanceTo(enemy.mesh.position) < attackRange) {
          enemy.hp -= dmg;
          const knockDir = enemy.mesh.position.clone().sub(playerGroup.position).normalize();
          enemy.mesh.position.addScaledVector(knockDir, 2.2);
        }
      });
    }

    function castFoxFire() {
      if (cooldowns.Z) return;
      triggerCooldown('Z', 'card-z');

      const dmg = 35 * getDmgMultiplier();
      const dir = targetPoint.clone().sub(playerGroup.position);
      dir.y = 0; dir.normalize();

      for (let i = -1; i <= 1; i++) {
        const fbGeo = new THREE.SphereGeometry(0.7, 16, 16);
        const fbMat = new THREE.MeshBasicMaterial({ color: isTransformed ? 0xff00ff : 0x00f0ff });
        const fb = new THREE.Mesh(fbGeo, fbMat);

        const spreadDir = dir.clone().applyAxisAngle(new THREE.Vector3(0, 1, 0), i * 0.25);
        fb.position.copy(playerGroup.position);
        fb.position.y = 1.2;

        scene.add(fb);
        projectiles.push({ mesh: fb, direction: spreadDir, life: 50, damage: dmg });
      }
    }

    function castFoxDash() {
      if (cooldowns.X) return;
      triggerCooldown('X', 'card-x');

      const dmg = 60 * getDmgMultiplier();
      const dir = targetPoint.clone().sub(playerGroup.position);
      dir.y = 0; dir.normalize();

      playerGroup.position.addScaledVector(dir, isTransformed ? 16 : 12);

      enemies.forEach((enemy) => {
        if (playerGroup.position.distanceTo(enemy.mesh.position) < 6.5) {
          enemy.hp -= dmg;
        }
      });
    }

    // IMPROVED: Enhanced C Move (Expanding 3D Dome Shockwave + Energy Burst)
    function castTailBurst() {
      if (cooldowns.C) return;
      triggerCooldown('C', 'card-c');

      const dmg = 55 * getDmgMultiplier();
      const radius = 7.5;

      // 3D Expanding Energy Dome
      const domeGeo = new THREE.SphereGeometry(1, 24, 16, 0, Math.PI * 2, 0, Math.PI / 2);
      const domeMat = new THREE.MeshBasicMaterial({
        color: isTransformed ? 0xff00ff : 0x8000ff,
        transparent: true,
        opacity: 0.85,
        wireframe: true
      });
      const dome = new THREE.Mesh(domeGeo, domeMat);
      dome.position.copy(playerGroup.position);
      scene.add(dome);

      // Inner Core Flash
      const coreGeo = new THREE.SphereGeometry(0.8, 16, 16);
      const coreMat = new THREE.MeshBasicMaterial({ color: 0xff00ff, transparent: true, opacity: 0.9 });
      const core = new THREE.Mesh(coreGeo, coreMat);
      core.position.copy(playerGroup.position);
      scene.add(core);

      // Pointlight Burst
      const burstLight = new THREE.PointLight(0xff00ff, 8, 18);
      burstLight.position.copy(playerGroup.position);
      scene.add(burstLight);

      visualEffects.push({
        dome: dome,
        core: core,
        light: burstLight,
        scale: 1,
        maxScale: radius,
        opacity: 0.9
      });

      enemies.forEach((enemy) => {
        if (playerGroup.position.distanceTo(enemy.mesh.position) < radius) {
          enemy.hp -= dmg;
          const knockDir = enemy.mesh.position.clone().sub(playerGroup.position).normalize();
          enemy.mesh.position.addScaledVector(knockDir, 2.5);
        }
      });
    }

    // --- ENEMIES ---
    function spawnEnemy() {
      if (enemies.length < 6 && !isGameOver) {
        const angle = Math.random() * Math.PI * 2;
        const dist = 28 + Math.random() * 10;
        const x = Math.cos(angle) * dist;
        const z = Math.sin(angle) * dist;

        const meshGroup = new THREE.Group();
        const eGeo = new THREE.CylinderGeometry(0.8, 0.8, 2, 16);
        const eMat = new THREE.MeshStandardMaterial({ color: 0xd81b60, roughness: 0.5 });
        const eMesh = new THREE.Mesh(eGeo, eMat);
        eMesh.position.y = 1;
        meshGroup.add(eMesh);

        meshGroup.position.set(x, 0, z);
        scene.add(meshGroup);

        const baseHp = 50 + (level * 25);
        const enemyDmg = 0.3 + (level * 0.05);

        enemies.push({
          mesh: meshGroup,
          hp: baseHp,
          maxHp: baseHp,
          damage: enemyDmg,
          speed: 0.09 + Math.random() * 0.02
        });
      }
    }
    setInterval(spawnEnemy, 1400);

    function restartGame() {
      level = 1; currentXp = 0; xpNeeded = 100;
      beli = 0; maxHp = 150; hp = 150;
      isTransformed = false;
      humanGroup.visible = true;
      foxGroup.visible = false;
      document.getElementById('trans-status').style.display = 'none';

      playerGroup.position.set(0, 0, 0);
      enemies.forEach(e => scene.remove(e.mesh));
      enemies.length = 0;
      projectiles.forEach(p => scene.remove(p.mesh));
      projectiles.length = 0;

      isGameOver = false;
      document.getElementById('game-over').style.display = 'none';
      updateUI();
    }

    function updateUI() {
      document.getElementById('lvl').innerText = level;
      document.getElementById('beli').innerText = beli;
      document.getElementById('hp').innerText = `${Math.ceil(hp)}/${maxHp}`;
      document.getElementById('xp-bar').style.width = `${(currentXp / xpNeeded) * 100}%`;
    }

    // --- GAME LOOP ---
    function animate() {
      requestAnimationFrame(animate);

      if (!isGameOver) {
        const moveSpeed = isTransformed ? 0.27 : 0.18;
        if (keys['KeyW'] || keys['ArrowUp']) playerGroup.position.z -= moveSpeed;
        if (keys['KeyS'] || keys['ArrowDown']) playerGroup.position.z += moveSpeed;
        if (keys['KeyA'] || keys['ArrowLeft']) playerGroup.position.x -= moveSpeed;
        if (keys['KeyD'] || keys['ArrowRight']) playerGroup.position.x += moveSpeed;

        playerGroup.position.x = Math.max(-55, Math.min(55, playerGroup.position.x));
        playerGroup.position.z = Math.max(-55, Math.min(55, playerGroup.position.z));

        const lookAngle = Math.atan2(
          targetPoint.x - playerGroup.position.x,
          targetPoint.z - playerGroup.position.z
        );
        playerGroup.rotation.y = lookAngle;

        camera.position.x = playerGroup.position.x;
        camera.position.y = playerGroup.position.y + 20;
        camera.position.z = playerGroup.position.z + 18;
        camera.lookAt(playerGroup.position);

        // Update Visual Effects (Tail Burst Animation)
        for (let i = visualEffects.length - 1; i >= 0; i--) {
          const fx = visualEffects[i];
          fx.scale += 0.55;
          fx.opacity -= 0.06;

          fx.dome.scale.set(fx.scale, fx.scale, fx.scale);
          fx.core.scale.set(fx.scale * 0.8, fx.scale * 0.8, fx.scale * 0.8);
          fx.dome.material.opacity = fx.opacity;
          fx.core.material.opacity = fx.opacity;

          if (fx.opacity <= 0) {
            scene.remove(fx.dome);
            scene.remove(fx.core);
            scene.remove(fx.light);
            visualEffects.splice(i, 1);
          }
        }

        // Projectiles
        for (let i = projectiles.length - 1; i >= 0; i--) {
          const p = projectiles[i];
          p.mesh.position.addScaledVector(p.direction, 0.5);
          p.life--;

          enemies.forEach((enemy) => {
            if (p.mesh.position.distanceTo(enemy.mesh.position) < 1.8) {
              enemy.hp -= p.damage;
              p.life = 0;
            }
          });

          if (p.life <= 0) {
            scene.remove(p.mesh);
            projectiles.splice(i, 1);
          }
        }

        // Enemies
        for (let i = enemies.length - 1; i >= 0; i--) {
          const enemy = enemies[i];
          const dir = playerGroup.position.clone().sub(enemy.mesh.position);
          dir.y = 0; dir.normalize();
          enemy.mesh.position.addScaledVector(dir, enemy.speed);
          enemy.mesh.rotation.y = Math.atan2(dir.x, dir.z);

          if (enemy.mesh.position.distanceTo(playerGroup.position) < 1.6) {
            hp -= enemy.damage;
            if (hp <= 0) {
              hp = 0;
              isGameOver = true;
              document.getElementById('game-over').style.display = 'flex';
            }
            updateUI();
          }

          if (enemy.hp <= 0) {
            scene.remove(enemy.mesh);
            enemies.splice(i, 1);
            beli += 75;
            gainXp(45 + level * 5);
          }
        }
      }

      renderer.render(scene, camera);
    }

    window.addEventListener('resize', () => {
      camera.aspect = window.innerWidth / window.innerHeight;
      camera.updateProjectionMatrix();
      renderer.setSize(window.innerWidth, window.innerHeight);
    });

    animate();
  </script>
</body>
</html>
